name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            PROJECT=mind-vault
            PORT=10016

            cd /srv/projects/$PROJECT
            git pull origin main

            # Install Python deps with uv
            if ! command -v uv &>/dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi
            export PATH="$HOME/.local/bin:$PATH"
            uv sync

            # Write .env with API keys
            cat > /srv/projects/$PROJECT/.env << ENVEOF
GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
ENVEOF

            # Create systemd service if not exists
            if [ ! -f /etc/systemd/system/$PROJECT.service ]; then
              sudo tee /etc/systemd/system/$PROJECT.service > /dev/null << EOF
            [Unit]
            Description=MindVault AI notes service
            After=network.target

            [Service]
            Type=simple
            User=lewsi
            WorkingDirectory=/srv/projects/$PROJECT
            ExecStart=/srv/projects/$PROJECT/.venv/bin/uvicorn src.main:app --host 127.0.0.1 --port $PORT
            Environment="PATH=/home/lewsi/.local/bin:/home/lewsi/.nvm/versions/node/v22.17.1/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            Environment="BASE_PATH=mind-vault"
            EnvironmentFile=/srv/projects/$PROJECT/.env
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF
              sudo systemctl daemon-reload
              sudo systemctl enable $PROJECT
            fi

            # Create nginx config if not exists
            if [ ! -f /etc/nginx/conf.d/projects/$PROJECT.conf ]; then
              sudo tee /etc/nginx/conf.d/projects/$PROJECT.conf > /dev/null << 'EOF'
            location /mind-vault/ {
                proxy_pass http://127.0.0.1:10016/mind-vault/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
            EOF
              sudo nginx -t && sudo systemctl reload nginx
            fi

            sudo systemctl restart $PROJECT
